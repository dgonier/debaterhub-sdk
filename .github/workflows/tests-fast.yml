name: Fast Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install -e ".[dev]"

      - name: Run fast tests
        run: |
          python3.11 -m pytest tests/ -m "not slow" -v --tb=short --timeout=30
